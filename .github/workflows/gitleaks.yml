name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@37aee1306f74b3beb7cc6375247c99479c3d18a9 # v1.14.16
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
